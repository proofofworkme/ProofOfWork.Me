[Unit]
RequiresMountsFor=/data/proofofwork-api-cache

[Service]
EnvironmentFile=/opt/proofofwork-api/config/proof-indexer-db.env
EnvironmentFile=/etc/proofofwork-api/internal-verifier.env
Environment=POW_API_CACHE_DIR=/data/proofofwork-api-cache
Environment=POW_API_DISK_MIN_FREE_BYTES=5368709120
Environment=POW_API_DISK_MAX_USED_PERCENT=90
Environment=POW_INDEX_DB_POOL_MAX=12
Environment=POW_INDEX_DB_CONNECT_TIMEOUT_MS=30000
Environment=POW_INDEX_READS=tx-status,log-history,token-history,token-state,registry-history,work-floor,work-summary,marketplace-summary,growth-summary,infinity-summary,event-history,address-mail
Environment=POW_INDEX_SHADOW_READS=log-history,token-history
Environment=POW_INDEX_READ_UNCONFIRMED_TX_STATUS=0
Environment=POW_INDEX_TOKEN_HISTORY_MAX_AGE_MS=86400000
Environment=POW_INDEX_CONFIRMED_READ_MAX_LAG_BLOCKS=6
Environment=POW_INDEX_HEALTH_MAX_AGE_MS=120000
Environment=POW_INTERNAL_VERIFIER_STATE_TTL_MS=120000
Environment=POW_INDEX_SNAPSHOT_READ_MAX_AGE_MS=600000
Environment=ENABLE_GLOBAL_ACTIVITY_CRAWL=0
Environment=ENABLE_SUMMARY_TOKEN_REFRESH=0
Environment=ENABLE_API_LEDGER_BACKGROUND_REFRESH=0
Environment=WORK_TOKEN_LIVE_NON_MINT_MAX_TXS=1000
Environment=WORK_TOKEN_LIVE_NON_MINT_SCAN_MAX_TXS=20000
Environment=WORK_FLOOR_FRESH_WAIT_MS=8000
Environment=WORK_TOKEN_CANONICAL_FRESH_WAIT_MS=30000
Environment=LEDGER_SUMMARY_FRESH_WAIT_MS=12000
Environment=LEDGER_SUMMARY_CURRENT_FALLBACK_WAIT_MS=45000
Environment=MARKETPLACE_SUMMARY_FRESH_WAIT_MS=12000
Environment=MARKETPLACE_SUMMARY_FRESH_HARD_CAP_MS=12000
Environment=MARKETPLACE_SUMMARY_CURRENT_FALLBACK_WAIT_MS=45000
Environment=SUMMARY_PROOF_INDEX_READ_WAIT_MS=45000
Environment=SUMMARY_TOKEN_CURRENT_FALLBACK_WAIT_MS=8000
Environment=MAIL_INDEXED_LOOKUP_WAIT_MS=10000
Environment=MAIL_INDEXED_ENRICH_WAIT_MS=10000
ExecStartPre=+/usr/bin/install -d -o powadmin -g powadmin -m 0750 /data/proofofwork-api-cache
ReadWritePaths=-/data/proofofwork-api-cache
LimitCORE=0
